name: Sync Openlist Image To Docker Hub

on:
  # 触发条件 1：定时触发（这里设置为每天 UTC 时间 0:00，即北京时间早上 8 点自动同步）
  schedule:
    - cron: '0 0 * * *'
  # 触发条件 2：支持手动点击按钮立刻触发
  workflow_dispatch:

jobs:
  sync-image:
    runs-on: ubuntu-latest
    steps:
      # Step 1: 登录到 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 2: 拉取、改名并推送镜像
      # 注意：请把 "原作者/openlist" 替换为你想同步的实际原版镜像名
      - name: Pull, Tag, and Push
        run: |
          # 1. 拉取最新的原版镜像
          docker pull openlistteam/openlist:latest
          
          # 2. 为镜像打上你自己的 Docker Hub 标签
          docker tag openlistteam/openlist:latest ${{ secrets.DOCKERHUB_USERNAME }}/openlist:latest
          
          # 3. 推送到你自己的仓库
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/openlist:latest
          
          echo "同步完成！"
